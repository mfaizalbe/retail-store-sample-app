image:
  repository: ${image_repository}
  tag: ${image_tag}

app:
  endpoints:
    catalog: http://catalog.catalog.svc:80
    carts: http://carts.carts.svc:80
    orders: http://orders.orders.svc:80
    checkout: http://checkout.checkout.svc:80

%{ if opentelemetry_enabled }
podAnnotations:
  cloudwatch.aws.amazon.com/auto-annotate-java: "false"
  cloudwatch.aws.amazon.com/auto-annotate-nodejs: "false"
  cloudwatch.aws.amazon.com/auto-annotate-python: "false"
  cloudwatch.aws.amazon.com/auto-annotate-dotnet: "false"
  instrumentation.opentelemetry.io/inject-java: ${opentelemetry_instrumentation}
%{ endif }

%{ if istio_enabled }
istio:
  enabled: true
  hosts:
  - "*"
%{ else }
service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external 
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-attributes: "load_balancing.cross_zone.enabled=true"
%{ endif }